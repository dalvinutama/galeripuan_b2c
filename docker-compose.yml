version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_NAME
      - APP_ENV
      - APP_KEY
      - APP_DEBUG
      - APP_URL
      - ALLOWED_HOSTS
      - APP_THEME
      - DB_CONNECTION
      - DB_HOST
      - DB_PORT
      - DB_DATABASE
      - DB_USERNAME
      - DB_PASSWORD
      - BROADCAST_DRIVER
      - CACHE_DRIVER
      - FILESYSTEM_DISK
      - QUEUE_CONNECTION
      - SESSION_DRIVER=file
      - SESSION_LIFETIME
      - SESSION_DOMAIN
      - SESSION_SECURE_COOKIE
      - MAIL_MAILER
      - MAIL_HOST
      - MAIL_PORT
      - MAIL_USERNAME
      - MAIL_PASSWORD
      - MAIL_ENCRYPTION
      - MAIL_FROM_ADDRESS
      - MAIL_FROM_NAME
      - PUSHER_APP_ID
      - PUSHER_APP_KEY
      - PUSHER_APP_SECRET
      - PUSHER_APP_CLUSTER
      - PUSHER_PORT
      - PUSHER_SCHEME
      - VITE_PUSHER_APP_KEY
      - VITE_PUSHER_APP_CLUSTER
      - API_ONGKIR_BASE_URL
      - API_ONGKIR_KEY
      - API_ONGKIR_ORIGIN
      - MIDTRANS_MERCHANT_ID
      - MIDTRANS_CLIENT_KEY
      - MIDTRANS_SERVER_KEY
      - MIDTRANS_IS_PRODUCTION
      - MIDTRANS_IS_SANITIZED
      - MIDTRANS_IS_3DS
    volumes:
      - app_storage:/var/www/html/storage

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gallery_puan
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
  app_storage:
